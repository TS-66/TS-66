<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TS-66 // BETA_PRIME</title>
    <style>
        :root {
            --red: #ff3131;
            --bg: #050505;
            --glass: rgba(20, 0, 0, 0.8);
            --border: rgba(255, 49, 49, 0.5);
            --glow: 0 0 15px var(--red);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* --- BETA WATERMARK --- */
        .beta-overlay {
            position: fixed;
            top: 10px; right: 10px;
            color: var(--red);
            font-weight: bold;
            border: 1px solid var(--red);
            padding: 5px 10px;
            font-size: 0.7rem;
            z-index: 9999;
            text-shadow: var(--glow);
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 50% { opacity: 0.3; } }

        /* --- LOGIN SCREEN --- */
        #login-screen {
            position: fixed; inset: 0;
            display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle, #250000 0%, #050505 100%);
            z-index: 1000;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1), opacity 1s;
        }

        .login-card {
            width: 90%; max-width: 400px;
            padding: 40px 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(15px);
            text-align: center;
            box-shadow: var(--glow);
        }

        .login-card h1 { font-size: 1.5rem; letter-spacing: 5px; color: var(--red); margin-bottom: 30px; }

        input {
            width: 100%; padding: 15px; margin-bottom: 20px;
            background: rgba(0,0,0,0.6); border: 1px solid #333;
            color: var(--red); text-align: center; font-family: inherit;
            outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--red); box-shadow: 0 0 10px rgba(255,0,0,0.3); }

        .btn {
            width: 100%; padding: 15px; background: var(--red);
            color: black; border: none; font-weight: bold;
            letter-spacing: 3px; cursor: pointer; transition: 0.3s;
        }

        .btn:active { transform: scale(0.95); background: #fff; }

        /* --- MAIN GUI (MOBILE FRIENDLY) --- */
        #main-site {
            display: none; height: 100%; width: 100%;
            grid-template-rows: 60px 1fr 50px;
            opacity: 0; transition: opacity 1s;
        }

        header {
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid var(--red);
            background: #000; font-size: 0.9rem; letter-spacing: 3px;
        }

        .content-container {
            overflow-y: auto; padding: 20px;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(15,0,0,0.9));
        }

        .card {
            border: 1px solid #222; background: rgba(0,0,0,0.5);
            padding: 20px; margin-bottom: 20px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .file-title { color: var(--red); font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 15px; }

        /* --- MOBILE NAV --- */
        nav {
            display: flex; border-top: 1px solid var(--red); background: #000;
        }

        .nav-item {
            flex: 1; display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: #666; cursor: pointer; border-right: 1px solid #111;
        }

        .nav-item.active { color: var(--red); background: rgba(255,0,0,0.1); }

        /* --- GLITCH EFFECT --- */
        .glitch-layer {
            position: fixed; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 2px);
            z-index: 500;
        }
    </style>
</head>
<body>

    <div class="beta-overlay">BETA_RELEASE_v3.1</div>
    <div class="glitch-layer"></div>

    <div id="login-screen">
        <div class="login-card">
            <h1>TS-66 ACCESS</h1>
            <input type="text" id="user" placeholder="ID (TEST)" autocomplete="off">
            <input type="password" id="pass" placeholder="KEY (TEST)">
            <button class="btn" onclick="auth()">AUTHORIZE</button>
            <p id="msg" style="font-size: 0.6rem; margin-top: 15px; color: #444;">BETA ENCRYPTION ACTIVE</p>
        </div>
    </div>

    <div id="main-site">
        <header>TS-66 // HANDBOOK</header>

        <div class="content-container" id="viewer">
            </div>

        <nav>
            <div class="nav-item active" onclick="load('core', this)">CORE</div>
            <div class="nav-item" onclick="load('logs', this)">LOGS</div>
            <div class="nav-item" onclick="load('status', this)">SYS</div>
        </nav>
    </div>

    <script>
        function auth() {
            const u = document.getElementById('user').value.toUpperCase();
            const p = document.getElementById('pass').value.toUpperCase();

            if(u === "TEST" && p === "TEST") {
                const ls = document.getElementById('login-screen');
                ls.style.opacity = '0';
                ls.style.transform = 'translateY(-100%)';
                
                setTimeout(() => {
                    ls.style.display = 'none';
                    const ms = document.getElementById('main-site');
                    ms.style.display = 'grid';
                    setTimeout(() => ms.style.opacity = '1', 50);
                    load('core', document.querySelector('.nav-item'));
                }, 1000);
            } else {
                document.getElementById('msg').innerText = "ACCESS DENIED";
                document.getElementById('msg').style.color = "red";
            }
        }

        const db = {
            core: `
                <div class="card">
                    <div class="file-title">BETA OVERVIEW</div>
                    <p>TS-66 is a sentient data-fracture. You are currently synchronized with the beta-phase of the takeover.</p>
                </div>
                <div class="card">
                    <div class="file-title">WARNING</div>
                    <p>Mobile access is less stable. Do not shake the device while TS-66 is decrypting.</p>
                </div>
            `,
            logs: `
                <div class="card">
                    <div class="file-title">INCIDENT_2026_03</div>
                    <p>March 25: All Foundation sites transitioned to Beta state. TS-66 confirmed as the source.</p>
                </div>
            `,
            status: `
                <div class="card">
                    <div class="file-title">SYSTEM HEALTH</div>
                    <p>Reality: [STABLE]<br>Signal: [BETA-ONLY]<br>User: AUTHORIZED</p>
                    <div style="height:4px; width:100%; background:#111; margin-top:10px;">
                        <div style="height:100%; width:88%; background:var(--red);"></div>
                    </div>
                </div>
            `
        };

        function load(key, el) {
            document.getElementById('viewer').innerHTML = db[key];
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            
            // Mobile Vibration Effect (if supported)
            if (navigator.vibrate) navigator.vibrate(10);
        }
    </script>
</body>
</html>
